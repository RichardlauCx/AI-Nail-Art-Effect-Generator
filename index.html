<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI美甲效果生成器 | 奈之何科技</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-border {
            0%, 100% { border-color: #6366f1; }
            50% { border-color: #a5b4fc; }
        }
        .upload-area {
            transition: all 0.3s ease;
        }
        .upload-area:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.1);
        }
        .upload-area.dragover {
            animation: pulse-border 1.5s infinite;
            background-color: #f5f3ff;
        }
        .loading-spinner {
            border: 3px solid #e0e7ff;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- 头部 -->
    <header class="bg-white shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <h1 class="text-2xl font-bold text-indigo-600">AI美甲效果生成器</h1>
            <span class="text-sm text-gray-500">奈之何科技出品</span>
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="flex-1 max-w-6xl mx-auto px-4 py-8 w-full">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- 左侧：上传与输入区 -->
            <div class="space-y-6">
                <!-- 图片上传区 -->
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">1. 上传素材图片</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <!-- 人物图片上传 -->
                        <div class="upload-area border-2 border-dashed border-gray-300 rounded-lg p-4 text-center cursor-pointer hover:border-indigo-500" id="personUpload">
                            <input type="file" id="personImage" class="hidden" accept="image/*">
                            <label for="personImage" class="cursor-pointer">
                                <div id="personPreview" class="space-y-2">
                                    <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                    </svg>
                                    <p class="text-sm text-gray-500">上传人物图片</p>
                                </div>
                            </label>
                        </div>

                        <!-- 美甲图片上传 -->
                        <div class="upload-area border-2 border-dashed border-gray-300 rounded-lg p-4 text-center cursor-pointer hover:border-indigo-500" id="nailUpload">
                            <input type="file" id="nailImage" class="hidden" accept="image/*">
                            <label for="nailImage" class="cursor-pointer">
                                <div id="nailPreview" class="space-y-2">
                                    <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172-9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                    </svg>
                                    <p class="text-sm text-gray-500">上传美甲图片</p>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 提示词输入区 -->
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h2 class="text-lg font-semibold text-gray-800 mb-4">2. 输入生成提示词</h2>
                    <textarea id="promptInput" rows="8" class="w-full border border-gray-300 rounded-lg p-4 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none" placeholder="请输入生成提示词...">专业美甲效果，将美甲样式精准贴合在人物手指上，第一人称低角度仰拍，超广角，手部特写，指甲清晰聚焦，人物略微失焦，虎口面对镜头，拇指食指伸直，其余手指自然弯曲，3:4比例，高清质感，自然光，背景简洁，细节逼真</textarea>
                </div>

                <!-- 生成按钮 -->
                <button id="generateBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-6 rounded-lg transition-colors flex items-center justify-center gap-2">
                    <span>开始生成</span>
                </button>
            </div>

            <!-- 右侧：结果展示区 -->
            <div class="bg-white rounded-xl shadow-sm p-6">
                <h2 class="text-lg font-semibold text-gray-800 mb-4">生成结果</h2>
                <div id="resultArea" class="border-2 border-dashed border-gray-200 rounded-lg min-h-[500px] flex items-center justify-center text-gray-400">
                    <div class="text-center">
                        <svg class="mx-auto h-16 w-16 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <p class="mt-2">AI生成图片将在这里显示</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚版权 -->
    <footer class="bg-gray-800 text-white py-4 mt-auto">
        <div class="max-w-6xl mx-auto px-4 text-center text-sm">
            <p>© 2026 奈之何科技 版权所有 | AI美甲效果生成器 免费商用版</p>
        </div>
    </footer>

    <script>
        // ============== 核心功能：Imgur上传 + Pollinations AI生成 ==============
        // 图片上传预览
        function setupImageUpload(inputId, previewId) {
            const input = document.getElementById(inputId);
            const preview = document.getElementById(previewId);
            const uploadArea = input.closest('.upload-area');

            input.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        preview.innerHTML = `<img src="${event.target.result}" class="w-full h-40 object-cover rounded-lg" alt="预览">`;
                    }
                    reader.readAsDataURL(file);
                }
            });

            uploadArea.addEventListener('dragover', e => e.preventDefault());
            uploadArea.addEventListener('drop', e => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    const dt = new DataTransfer();
                    dt.items.add(file);
                    input.files = dt.files;
                    input.dispatchEvent(new Event('change'));
                }
            });
        }

        // 初始化上传
        setupImageUpload('personImage', 'personPreview');
        setupImageUpload('nailImage', 'nailPreview');

        // 1. Imgur免费上传图片（匿名，无密钥，直接用）
        async function uploadToImgur(file) {
            const formData = new FormData();
            formData.append('image', file);
            
            const res = await fetch('https://api.imgur.com/3/image', {
                method: 'POST',
                headers: { Authorization: 'Client-ID 546c25a592f0c0c' }, // 公开匿名密钥，直接用
                body: formData
            });
            
            const data = await res.json();
            return data.data.link; // 返回图片公开URL
        }

        // 2. Pollinations免费AI生成图片（无密钥，无限调用）
        function generatePollinationsImage(personUrl, nailUrl, prompt) {
            const fullPrompt = encodeURIComponent(
                `${prompt} 参考图片1：${personUrl} 参考图片2：${nailUrl}`
            );
            // 3:4比例，高清
            return `https://image.pollinations.ai/prompt/${fullPrompt}?width=600&height=800&nologo=true`;
        }

        // 生成按钮主逻辑
        const generateBtn = document.getElementById('generateBtn');
        const resultArea = document.getElementById('resultArea');
        const promptInput = document.getElementById('promptInput');

        generateBtn.addEventListener('click', async function() {
            const personFile = document.getElementById('personImage').files[0];
            const nailFile = document.getElementById('nailImage').files[0];
            const prompt = promptInput.value.trim();

            // 校验
            if (!personFile || !nailFile) {
                alert('请上传人物图片和美甲图片');
                return;
            }
            if (!prompt) {
                alert('请输入生成提示词');
                return;
            }

            // 加载状态
            generateBtn.disabled = true;
            generateBtn.innerHTML = `<div class="loading-spinner"></div><span>上传图片+生成中...</span>`;
            resultArea.innerHTML = `<div class="text-center text-gray-500 py-20">第一步：上传图片到Imgur...</div>`;

            try {
                // 第一步：上传两张图片获取URL
                resultArea.innerHTML = `<div class="text-center text-gray-500 py-20">第二步：AI生成美甲效果...</div>`;
                const personUrl = await uploadToImgur(personFile);
                const nailUrl = await uploadToImgur(nailFile);

                // 第二步：调用Pollinations生成图片
                const finalImageUrl = generatePollinationsImage(personUrl, nailUrl, prompt);

                // 展示结果
                resultArea.innerHTML = `
                    <div class="p-2">
                        <img src="${finalImageUrl}" class="w-full rounded-lg shadow-lg" alt="AI生成美甲效果" onload="this.style.opacity=1" style="opacity:0;transition:opacity 0.5s">
                        <p class="text-center text-sm text-gray-500 mt-3">✅ 生成完成（免费无限制）</p>
                    </div>
                `;

            } catch (err) {
                console.error(err);
                resultArea.innerHTML = `<div class="text-center text-red-500 py-20">生成失败，请重试</div>`;
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = `<span>重新生成</span>`;
            }
        });
    </script>
</body>
</html>
